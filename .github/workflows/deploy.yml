name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, beta-support ]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:bundle

      - name: Copy main to _site
        run: |
          mkdir -p _site
          cp -r public/* _site/

      - name: Checkout beta-support
        uses: actions/checkout@v4
        with:
          ref: beta-support
          path: beta-checkout

      - name: Install beta dependencies
        working-directory: beta-checkout
        run: npm ci

      - name: Build beta
        working-directory: beta-checkout
        run: npm run build:bundle

      - name: Copy beta-support to _site/beta
        run: |
          mkdir -p _site/beta
          cp -r beta-checkout/public/* _site/beta/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
