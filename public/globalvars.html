<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horizon's Gate Global Variable Reference</title>
    <link rel="stylesheet" href="shared-base.css" />
    <link rel="stylesheet" href="shared-reference.css" />
    <link rel="stylesheet" href="globalvars.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Horizon's Gate Global Variable Reference</h1>
        <div class="header-actions">
          <div class="nav-menu">
            <button class="nav-menu-button">Menu</button>
            <div class="nav-menu-dropdown">
              <a href="index.html" class="nav-link">Mod Validator</a>
              <hr class="nav-menu-separator" />
              <a href="tasks.html" class="nav-link">Task Reference</a>
              <a href="formulas.html" class="nav-link">Formula Reference</a>
              <a href="dynamic-text.html" class="nav-link">Dynamic Text Reference</a>
              <a href="globalvars.html" class="nav-link">Global Variable Reference</a>
            </div>
          </div>
          <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
            🌙
          </button>
        </div>
      </header>

      <main class="globalvars-main">
        <div class="globalvars-section">
          <div class="section-header">
            <h2>Global Variables</h2>
            <div id="gameVersion" class="game-version"></div>
            <div id="globalvarCount" class="globalvar-count"></div>
          </div>

          <div class="search-wrapper">
            <input
              type="text"
              id="searchInput"
              class="search-input"
              placeholder="Search names, descriptions, categories, or references..."
              autocomplete="off"
            />
            <button id="clearSearch" class="clear-search" aria-label="Clear search">×</button>
          </div>

          <div class="globalvars-controls">
            <label class="filter-label">
              Category:
              <select id="categoryFilter" class="filter-select">
                <option value="">All</option>
              </select>
            </label>
            <button id="expandAll" class="btn btn-secondary">Expand All</button>
            <button id="collapseAll" class="btn btn-secondary">Collapse All</button>
            <label class="highlight-checkbox">
              <input type="checkbox" id="highlightToggle" checked />
              Highlight matches
            </label>
          </div>

          <div id="globalvarsList" class="globalvars-list">
            <p class="placeholder">Loading global variables...</p>
          </div>
        </div>
      </main>
    </div>

    <script src="app.bundle.js"></script>
  </body>
</html>
